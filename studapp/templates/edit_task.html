<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduCore — Edit Task</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0d0f14;--surface:#13161e;--surf2:#1a1e28;--border:rgba(255,255,255,0.07);--accent:#5b7cfa;--green:#4ec9a0;--amber:#f0a84e;--red:#f0614e;--text:#eef0f7;--muted:#7a7f96;--r:14px;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:flex;min-height:100vh;}
    .sidebar{width:230px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;}
    .logo{padding:26px 22px 20px;border-bottom:1px solid var(--border);}
    .logo h1{font-family:'DM Serif Display',serif;font-size:21px;}
    .logo h1 span{color:var(--accent);}
    .logo p{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
    nav{padding:18px 10px;flex:1;}
    .nav-label{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);padding:0 12px;margin:16px 0 5px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;transition:.15s;}
    .nav-item:hover{background:var(--surf2);color:var(--text);}
    .nav-item.active{background:rgba(91,124,250,.15);color:var(--accent);}
    .nav-item .ico{font-size:15px;width:18px;text-align:center;}
    .main{margin-left:230px;flex:1;display:flex;flex-direction:column;}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;}
    .topbar h2{font-size:18px;font-weight:600;}
    .content{padding:30px 32px;flex:1;max-width:700px;}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;}
    .card h3{font-size:16px;font-weight:600;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid var(--border);}
    .form-group{margin-bottom:18px;}
    label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500;}
    input,select,textarea{width:100%;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:9px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:.15s;}
    input:focus,select:focus,textarea:focus{border-color:var(--accent);}
    textarea{resize:vertical;min-height:100px;}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:11px 22px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;border:none;transition:.15s;}
    .btn-primary{background:var(--accent);color:#fff;}
    .btn-primary:hover{opacity:.88;}
    .btn-ghost{background:var(--surf2);color:var(--text);border:1px solid var(--border);}
    .actions{display:flex;gap:12px;margin-top:8px;}
  </style>
</head>
<body>
<div class="sidebar">
  <div class="logo"><h1>Edu<span>Core</span></h1><p>Admin Panel</p></div>
  <nav>
    <div class="nav-label">Main</div>
    <a href="{% url 'dashboard' %}" class="nav-item"><span class="ico">🏠</span> Dashboard</a>
    <a href="{% url 'student_list' %}" class="nav-item"><span class="ico">👥</span> Students</a>
    <a href="{% url 'mark_attendance' %}" class="nav-item"><span class="ico">✅</span> Mark Attendance</a>
    <a href="{% url 'attendance_report' %}" class="nav-item"><span class="ico">📊</span> Reports</a>
    <div class="nav-label">Features</div>
    <a href="{% url 'task_list' %}" class="nav-item active"><span class="ico">📋</span> Task Management</a>
    <a href="{% url 'leave_list' %}" class="nav-item"><span class="ico">📅</span> Leave Management</a>
    <div class="nav-label">Account</div>
    <a href="{% url 'logout' %}" class="nav-item"><span class="ico">🚪</span> Logout</a>
  </nav>
</div>

<div class="main">
  <div class="topbar">
    <h2>✏️ Edit Task</h2>
    <a href="{% url 'task_list' %}" class="btn btn-ghost">← Back</a>
  </div>
  <div class="content">
    <div class="card">
      <h3>Update Task: {{ task.title }}</h3>
      <form method="post">
        {% csrf_token %}

        <div class="form-group">
          <label>Assigned To</label>
          <select name="student_id" required>
            {% for s in students %}
              <option value="{{ s.id }}" {% if s.id == task.student.id %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="form-group">
          <label>Task Title *</label>
          <input type="text" name="title" value="{{ task.title }}" required/>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea name="description">{{ task.description }}</textarea>
        </div>

        <div class="row3">
          <div class="form-group">
            <label>Due Date *</label>
            <input type="date" name="due_date" value="{{ task.due_date|date:'Y-m-d' }}" required/>
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select name="priority">
              <option value="Low"    {% if task.priority == 'Low' %}selected{% endif %}>🟢 Low</option>
              <option value="Medium" {% if task.priority == 'Medium' %}selected{% endif %}>🟡 Medium</option>
              <option value="High"   {% if task.priority == 'High' %}selected{% endif %}>🔴 High</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select name="status">
              <option value="Pending"     {% if task.status == 'Pending' %}selected{% endif %}>⏳ Pending</option>
              <option value="In Progress" {% if task.status == 'In Progress' %}selected{% endif %}>🔄 In Progress</option>
              <option value="Completed"   {% if task.status == 'Completed' %}selected{% endif %}>✅ Completed</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn-primary">💾 Save Changes</button>
          <a href="{% url 'task_list' %}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
